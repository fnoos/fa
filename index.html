<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>فانوس | بنفش پیش‌فرض</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            /* تنظیم بنفش یاسی به عنوان رنگ پیش‌فرض */
            --main-bg: #f5f3ff;
            --main-accent: #a78bfa;
            --main-text: #4c1d95;
        }

        body {
            transition: background-color 0.4s ease, color 0.4s ease;
            background-color: var(--main-bg);
            color: var(--main-text);
            font-family: 'Vazirmatn', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        body.dark {
            --main-bg: #020617 !important;
            color: #f1f5f9 !important;
        }

        .glass-card {
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.6);
            border-radius: 35px;
            padding: 35px;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .dark .glass-card {
            background: rgba(15, 23, 42, 0.7);
            border-color: rgba(255, 255, 255, 0.05);
        }

        .bottom-nav {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            display: flex;
            justify-content: space-around;
            padding: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            z-index: 2000;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .dark .bottom-nav {
            background: rgba(30, 41, 59, 0.95);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            font-weight: 800;
            cursor: pointer;
            opacity: 0.4;
            transition: 0.2s;
        }

        .nav-item.active { opacity: 1; color: var(--main-accent); }

        #color-panel {
            position: fixed;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.98);
            padding: 18px;
            border-radius: 25px;
            display: flex;
            gap: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            opacity: 0;
            pointer-events: none;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2001;
        }

        #color-panel.show { opacity: 1; transform: translateX(-50%) translateY(-5px); pointer-events: auto; }

        .dot { 
            width: 32px; 
            height: 32px; 
            border-radius: 10px; 
            cursor: pointer; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid rgba(0,0,0,0.05);
        }
        
        .dot:hover { transform: rotate(15deg) scale(1.2); }
        .dot:active { transform: scale(0.9); }

        .tag {
            background: var(--main-accent);
            color: white;
            padding: 3px 12px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 900;
        }
    </style>
</head>
<body class="pb-40">

    <header class="max-w-xl mx-auto px-8 pt-20 mb-12 text-right">
        <h1 class="font-rubik text-7xl font-black mb-3 tracking-tighter" style="color: var(--main-accent)">فانوس.</h1>
        <p class="text-xl opacity-60 font-medium leading-relaxed">روایتگر آرامش در تلاطم روزگار.</p>
    </header>

    <main id="content-area" class="max-w-xl mx-auto px-6 space-y-8"></main>

    <div id="color-panel">
        <div class="dot" style="background: #a78bfa;" onclick="setTheme('#f5f3ff', '#a78bfa', '#4c1d95')"></div>
        <div class="dot" style="background: #38bdf8;" onclick="setTheme('#f0f9ff', '#38bdf8', '#0c4a6e')"></div>
        <div class="dot" style="background: #fb7185;" onclick="setTheme('#fff1f2', '#fb7185', '#881337')"></div>
        <div class="dot" style="background: #10b981;" onclick="setTheme('#f0fdf4', '#10b981', '#064e3b')"></div>
        <div class="dot" style="background: #ffb088;" onclick="setTheme('#fff5f0', '#ffb088', '#7c2d12')"></div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="showHome()">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M11.47 3.84a.75.75 0 011.06 0l8.69 8.69a.75.75 0 101.06-1.06l-8.689-8.69a2.25 2.25 0 00-3.182 0l-8.69 8.69a.75.75 0 001.061 1.06l8.69-8.69z" /><path d="M12 5.432l8.159 8.159c.03.03.06.058.091.086v6.198c0 1.035-.84 1.875-1.875 1.875H15a.75.75 0 01-.75-.75v-4.5a.75.75 0 00-.75-.75h-3a.75.75 0 00-.75.75V21a.75.75 0 01-.75.75H5.625a1.875 1.875 0 01-1.875-1.875v-6.198a2.29 2.29 0 00.091-.086L12 5.432z" /></svg>
            <span>خانه</span>
        </div>
        <div class="nav-item" onclick="toggleColorPanel()">
            <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"/></svg>
            <span>رنگ‌ها</span>
        </div>
        <div class="nav-item" onclick="toggleDark()">
            <svg id="theme-sun" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.25a.75.75 0 01.75.75v2.25a.75.75 0 01-1.5 0V3a.75.75 0 01.75-.75zM7.5 12a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM18.894 6.166a.75.75 0 00-1.06-1.06l-1.591 1.59a.75.75 0 101.06 1.061l1.591-1.59zM21.75 12a.75.75 0 01-.75.75h-2.25a.75.75 0 010-1.5H21a.75.75 0 01.75.75zM17.834 18.894a.75.75 0 001.06-1.06l-1.59-1.591a.75.75 0 10-1.061 1.06l1.59 1.591zM12 18.75a.75.75 0 01.75.75V21a.75.75 0 01-1.5 0v-1.5a.75.75 0 01.75-.75zM6.166 18.894a.75.75 0 001.06-1.06l-1.59-1.591a.75.75 0 00-1.061 1.06l1.59 1.591zM5.25 12a.75.75 0 01-.75.75H2.25a.75.75 0 010-1.5H4.5a.75.75 0 01.75.75zM7.751 7.751a.75.75 0 00-1.06-1.06L5.1 8.282a.75.75 0 001.06 1.06l1.591-1.591z" /></svg>
            <svg id="theme-moon" class="hidden" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" d="M9.528 1.718a.75.75 0 01.162.819A8.97 8.97 0 009 6a9 9 0 009 9 8.97 8.97 0 003.463-.69.75.75 0 01.981.98 10.503 10.503 0 01-9.694 6.46c-5.799 0-10.5-4.701-10.5-10.5 0-4.368 2.667-8.112 6.46-9.694a.75.75 0 01.818.162z" clip-rule="evenodd" /></svg>
            <span>تم</span>
        </div>
        <div class="nav-item" onclick="showAbout()">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" d="M7.5 6a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM3.751 20.105a8.25 8.25 0 0116.498 0 .75.75 0 01-.437.695A18.683 18.683 0 0112 22.5c-2.786 0-5.433-.608-7.812-1.7a.75.75 0 01-.437-.695z" clip-rule="evenodd" /></svg>
            <span>درباره</span>
        </div>
    </nav>

    <script>
        const posts = [
            { tag: "بندگی", content: "بندگی یعنی رها کردنِ تمامِ «من»ها، برای رسیدن به «او» که تمامِ ماست." },
            { tag: "نور", content: "فانوسِ قلبت را با یادِ الله روشن نگاه دار؛ دنیا تاریک‌تر از آن است که بی‌نور طی شود." },
            { tag: "صبر", content: "صبر، تلخ است اما ریشه‌هایش در بهشتِ رضایت آبیاری می‌شود." },
            { tag: "محبت", content: "مهربانی، زبانی است که ناشنوایان می‌شنوند و نابینایان می‌بینند." },
            { tag: "دعا", content: "دعا، پچ‌پچِ زمین با آسمان است؛ مطمئن باش صدایت در عرش می‌پیچد." },
            { tag: "امید", content: "امید، آخرین چیزی است که می‌میرد؛ چون الله همیشگی است." },
            { tag: "هدایت", content: "هر بن‌بستی، راهی به آسمان دارد؛ فقط کافیست سرت را بالا بگیری." },
            { tag: "آرامش", content: "آرامش یعنی میانِ طوفانِ حوادث، دستت در دستِ خدا باشد." },
            { tag: "اخلاق", content: "زیباییِ چهره پیر می‌شود، اما زیباییِ کلام هر روز جوان‌تر می‌ماند." },
            { tag: "توبه", content: "هر صبح فرصتی است برای بازگشت. رحمت او بزرگتر از گناه ماست." }
        ];

        function getPersianDate() {
            return new Intl.DateTimeFormat('fa-IR', {day:'numeric', month:'long', year:'numeric'}).format(new Date());
        }

        function renderPosts() {
            const container = document.getElementById('content-area');
            const date = getPersianDate();
            container.innerHTML = posts.map(p => `
                <article class="glass-card">
                    <div class="flex justify-between items-center mb-8">
                        <span class="tag transition-all duration-500">${p.tag}</span>
                        <span class="font-rubik text-[11px] font-bold opacity-30">${date}</span>
                    </div>
                    <p class="text-2xl leading-[1.9] font-medium opacity-90 mb-10">${p.content}</p>
                    <div class="flex justify-end pt-6 border-t border-black/5 dark:border-white/5">
                        <button onclick="share('${p.content}')" class="text-[var(--main-accent)] opacity-40 hover:opacity-100 transition-all">
                            <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg>
                        </button>
                    </div>
                </article>
            `).join('');
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function showHome() { renderPosts(); setActiveNav(0); }

        function showAbout() {
            document.getElementById('content-area').innerHTML = `
                <div class="glass-card text-center py-24 px-6">
                    <h2 class="font-rubik text-5xl font-black mb-8 text-[var(--main-accent)]">درباره فانوس</h2>
                    <p class="text-xl leading-loose opacity-80">
                        فانوس پروژه‌ای برای بازتابِ نور در کلمات است. ما معتقدیم یک جمله کوتاه می‌تواند مسیر یک روز را تغییر دهد. سادگی، هویت ماست.
                    </p>
                </div>
            `;
            setActiveNav(3);
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function toggleColorPanel() { document.getElementById('color-panel').classList.toggle('show'); }

        function setTheme(bg, accent, text) {
            document.documentElement.style.setProperty('--main-bg', bg);
            document.documentElement.style.setProperty('--main-accent', accent);
            document.documentElement.style.setProperty('--main-text', text);
            document.getElementById('color-panel').classList.remove('show');
            // بروزرسانی آیکون فعال در صورت نیاز
            document.querySelectorAll('.nav-item').forEach(el => {
                if(el.classList.contains('active')) el.style.color = accent;
            });
        }

        function toggleDark() {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            document.getElementById('theme-sun').classList.toggle('hidden', isDark);
            document.getElementById('theme-moon').classList.toggle('hidden', !isDark);
        }

        function setActiveNav(index) {
            document.querySelectorAll('.nav-item').forEach((item, i) => {
                item.classList.toggle('active', i === index);
                item.style.color = (i === index) ? 'var(--main-accent)' : 'inherit';
            });
        }

        function share(text) {
            if (navigator.share) navigator.share({ title: 'فانوس', text: text });
            else { navigator.clipboard.writeText(text); alert("در حافظه کپی شد."); }
        }

        window.onload = renderPosts;
    </script>
</body>
</html>
