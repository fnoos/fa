<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>فانوس | درنگ و آگاهی</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --main-bg: #f5f3ff;
            --main-accent: #a78bfa;
            --main-text: #4c1d95;
        }

        body {
            transition: background-color 0.4s ease, color 0.4s ease;
            background-color: var(--main-bg);
            color: var(--main-text);
            font-family: 'Vazirmatn', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        body.dark {
            --main-bg: #020617 !important;
            color: #f1f5f9 !important;
        }

        .glass-card {
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.6);
            border-radius: 35px;
            padding: 35px;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .dark .glass-card {
            background: rgba(15, 23, 42, 0.7);
            border-color: rgba(255, 255, 255, 0.05);
        }

        #about-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(25px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            opacity: 0;
            transition: 0.3s ease;
        }

        #about-overlay.show { display: flex; opacity: 1; }

        .about-content {
            width: 88%;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 40px;
            padding: 40px 30px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.4);
            transform: scale(0.9);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: var(--main-text);
        }

        .dark .about-content {
            background: rgba(15, 23, 42, 0.9);
            border-color: rgba(255, 255, 255, 0.1);
            color: #f1f5f9;
        }

        #about-overlay.show .about-content { transform: scale(1); }

        .social-link {
            color: #374151; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .dark .social-link {
            color: #e2e8f0; 
        }
        .social-link:hover {
            color: var(--main-accent) !important;
            transform: translateY(-5px);
        }

        .bottom-nav {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            display: flex;
            justify-content: space-around;
            padding: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            z-index: 2000;
        }

        .dark .bottom-nav { background: rgba(30, 41, 59, 0.9); }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            font-weight: 800;
            cursor: pointer;
            opacity: 0.5;
            transition: 0.3s;
        }

        .nav-item.active { opacity: 1; color: var(--main-accent) !important; }

        #color-panel {
            position: fixed;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 18px;
            border-radius: 25px;
            display: flex;
            gap: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            opacity: 0;
            pointer-events: none;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2001;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .dark #color-panel { background: rgba(30, 41, 59, 0.95); border-color: rgba(255,255,255,0.05); }

        #color-panel.show { opacity: 1; transform: translateX(-50%) translateY(-5px); pointer-events: auto; }

        .dot { width: 32px; height: 32px; border-radius: 10px; cursor: pointer; transition: 0.4s; }
        .dot:hover { transform: scale(1.2); }

        .tag { background: var(--main-accent); color: white; padding: 4px 14px; border-radius: 10px; font-size: 11px; font-weight: 900; }
    </style>
</head>
<body class="pb-40">

    <header class="max-w-xl mx-auto px-8 pt-20 mb-12 text-right">
        <h1 class="font-rubik text-7xl font-black mb-3 tracking-tighter" style="color: var(--main-accent)">فانوس...</h1>
        <p class="text-xl opacity-60 font-medium leading-relaxed">جایی برای درنگ، در جستجوی نوری که از درون می‌تابد.</p>
    </header>

    <main id="content-area" class="max-w-xl mx-auto px-6 space-y-8"></main>

    <div id="color-panel">
        <div class="dot" style="background: #a78bfa;" onclick="setTheme('#f5f3ff', '#a78bfa', '#4c1d95')"></div>
        <div class="dot" style="background: #38bdf8;" onclick="setTheme('#f0f9ff', '#38bdf8', '#0c4a6e')"></div>
        <div class="dot" style="background: #fb7185;" onclick="setTheme('#fff1f2', '#fb7185', '#881337')"></div>
        <div class="dot" style="background: #10b981;" onclick="setTheme('#f0fdf4', '#10b981', '#064e3b')"></div>
        <div class="dot" style="background: #ffb088;" onclick="setTheme('#fff5f0', '#ffb088', '#7c2d12')"></div>
    </div>

    <div id="about-overlay" onclick="closeAbout()">
        <div class="about-content" onclick="event.stopPropagation()">
            <h2 class="font-rubik text-4xl font-black mb-6" style="color: var(--main-accent)">درباره فانوس</h2>
            <p class="text-lg leading-loose opacity-80 mb-10">
                فانوس بستری برای بازتاب نور در دنیای کلمات است. ما معتقدیم سادگی، زیباترین شکل هوشمندی است.
            </p>
            <div class="flex justify-center gap-10 border-t border-black/5 dark:border-white/5 pt-8">
                <a href="#" class="social-link"><svg width="30" height="30" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69a.2.2 0 00-.05-.18c-.06-.05-.14-.03-.21-.02-.09.02-1.49.95-4.22 2.79-.4.27-.76.41-1.08.4-.36-.01-1.04-.2-1.55-.37-.63-.2-1.12-.31-1.08-.66.02-.18.27-.36.74-.55 2.92-1.27 4.86-2.11 5.83-2.51 2.78-1.16 3.35-1.36 3.73-1.36.08 0 .27.02.39.12.1.08.13.19.14.27-.01.06.01.24 0 .38z"/></svg></a>
                <a href="#" class="social-link"><svg width="28" height="28" fill="currentColor" viewBox="0 0 448 512"><path d="M448,209.91a210.06,210.06,0,0,1-122.77-39.25V349.38A162.55,162.55,0,1,1,185,188.31V278.2a74.62,74.62,0,1,0,52.23,71.18V0l88,0a121.18,121.18,0,0,0,1.86,22.17h0A122.18,122.18,0,0,0,381,102.39a121.43,121.43,0,0,0,67,20.14Z"/></svg></a>
                <a href="#" class="social-link"><svg width="30" height="30" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg></a>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div id="nav-home" class="nav-item active" onclick="handleNav(this, 'home')">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M11.47 3.84a.75.75 0 011.06 0l8.69 8.69a.75.75 0 101.06-1.06l-8.689-8.69a2.25 2.25 0 00-3.182 0l-8.69 8.69a.75.75 0 001.061 1.06l8.69-8.69z" /><path d="M12 5.432l8.159 8.159c.03.03.06.058.091.086v6.198c0 1.035-.84 1.875-1.875 1.875H15a.75.75 0 01-.75-.75v-4.5a.75.75 0 00-.75-.75h-3a.75.75 0 00-.75.75V21a.75.75 0 01-.75.75H5.625a1.875 1.875 0 01-1.875-1.875v-6.198a2.29 2.29 0 00.091-.086L12 5.432z" /></svg>
            <span>خانه</span>
        </div>
        <div id="nav-colors" class="nav-item" onclick="handleNav(this, 'colors')">
            <svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"/></svg>
            <span>رنگ‌ها</span>
        </div>
        <div class="nav-item" onclick="handleNav(this, 'theme')">
            <svg id="theme-sun" width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.25a.75.75 0 01.75.75v2.25a.75.75 0 01-1.5 0V3a.75.75 0 01.75-.75zM7.5 12a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM18.894 6.166a.75.75 0 00-1.06-1.06l-1.591 1.59a.75.75 0 101.06 1.061l1.591-1.59zM21.75 12a.75.75 0 01-.75.75h-2.25a.75.75 0 010-1.5H21a.75.75 0 01.75.75zM17.834 18.894a.75.75 0 001.06-1.06l-1.59-1.591a.75.75 0 10-1.061 1.06l1.59 1.591zM12 18.75a.75.75 0 01.75.75V21a.75.75 0 01-1.5 0v-1.5a.75.75 0 01.75-.75zM6.166 18.894a.75.75 0 001.06-1.06l-1.59-1.591a.75.75 0 00-1.061 1.06l1.59 1.591zM5.25 12a.75.75 0 01-.75.75H2.25a.75.75 0 010-1.5H4.5a.75.75 0 01.75.75zM7.751 7.751a.75.75 0 00-1.06-1.06L5.1 8.282a.75.75 0 001.06 1.06l1.591-1.591z" /></svg>
            <svg id="theme-moon" class="hidden" width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M9.528 1.718a.75.75 0 01.162.819A8.97 8.97 0 009 6a9 9 0 009 9 8.97 8.97 0 003.463-.69.75.75 0 01.981.98 10.503 10.503 0 01-9.694 6.46c-5.799 0-10.5-4.701-10.5-10.5 0-4.368 2.667-8.112 6.46-9.694a.75.75 0 01.818.162z" /></svg>
            <span>تم</span>
        </div>
        <div id="nav-about" class="nav-item" onclick="handleNav(this, 'about')">
            <svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z" /></svg>
            <span>درباره</span>
        </div>
    </nav>

    <script>
        const posts = [
            { tag: "بندگی", content: "بندگی یعنی رها کردنِ تمامِ «من»ها، برای رسیدن به «او» که تمامِ ماست." },
            { tag: "نور", content: "فانوسِ قلبت را با یادِ الله روشن نگاه دار؛ دنیا تاریک‌تر از آن است که بی‌نور طی شود." },
            { tag: "صبر", content: "صبر، تلخ است اما ریشه‌هایش در بهشتِ رضایت آبیاری می‌شود." }
        ];

        function handleNav(el, action) {
            if(action !== 'colors') {
                document.getElementById('color-panel').classList.remove('show');
                document.getElementById('nav-colors').classList.remove('active');
            }
            if(action === 'home') { resetActive(); el.classList.add('active'); renderPosts(); }
            if(action === 'colors') { resetActive(); el.classList.toggle('active'); document.getElementById('color-panel').classList.toggle('show'); }
            if(action === 'theme') { toggleDark(); }
            if(action === 'about') { resetActive(); el.classList.add('active'); openAbout(); }
        }

        function resetActive() { document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active')); }

        function renderPosts() {
            const container = document.getElementById('content-area');
            container.innerHTML = posts.map(p => `
                <article class="glass-card">
                    <div class="mb-6"><span class="tag">${p.tag}</span></div>
                    <p class="text-2xl leading-[1.9] font-medium opacity-90 mb-8">${p.content}</p>
                    <div class="flex justify-end pt-5 border-t border-black/5 dark:border-white/5">
                        <button onclick="share('${p.content}')" class="text-[var(--main-accent)] opacity-40 hover:opacity-100 transition-all p-1">
                            <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg>
                        </button>
                    </div>
                </article>
            `).join('');
        }

        function openAbout() { document.getElementById('about-overlay').classList.add('show'); }
        function closeAbout() { 
            document.getElementById('about-overlay').classList.remove('show');
            handleNav(document.getElementById('nav-home'), 'home');
        }

        function setTheme(bg, accent, text) {
            document.documentElement.style.setProperty('--main-bg', bg);
            document.documentElement.style.setProperty('--main-accent', accent);
            document.documentElement.style.setProperty('--main-text', text);
            document.getElementById('color-panel').classList.remove('show');
            document.getElementById('nav-colors').classList.remove('active');
            document.getElementById('nav-home').classList.add('active');
        }

        function toggleDark() {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            document.getElementById('theme-sun').classList.toggle('hidden', isDark);
            document.getElementById('theme-moon').classList.toggle('hidden', !isDark);
        }

        function share(text) {
            if (navigator.share) { navigator.share({ title: 'فانوس', text: text + '\n\n@Fanous_App' }); }
            else { navigator.clipboard.writeText(text); alert("در حافظه کپی شد."); }
        }

        window.onload = renderPosts;
    </script>
</body>
</html>
